<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contrato Digital - SUA87FM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1a1a1a,#2c2c2c);
  color: #333;
}
.container {
  max-width: 650px;
  margin: 40px auto;
  background: #fff;
  padding: 25px;
  border-radius: 12px;
}
h2 {
  text-align: center;
  color: #c40000;
}
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
}
canvas {
  border: 2px dashed #ccc;
  margin-top: 10px;
}
button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  background: #c40000;
  color: #fff;
  border: none;
  font-size: 16px;
  cursor: pointer;
}
button:hover {
  background: #900000;
}
</style>
</head>

<body>

<div class="container">
<h2>Contrato Digital SUA87FM 📻</h2>

<input id="nome" placeholder="Nome / Empresa">
<input id="cpf" placeholder="CPF ou CNPJ">
<input id="telefone" placeholder="WhatsApp">

<select id="plano">
  <option value="350">Plano R$ 350</option>
  <option value="450">Plano R$ 450</option>
</select>

<p><strong>Assinatura:</strong></p>
<canvas id="signature" width="600" height="200"></canvas>
<button onclick="limpar()">Limpar Assinatura</button>

<button onclick="enviar()">Enviar Contrato 🚀</button>
</div>

<script>
let canvas = document.getElementById("signature");
let ctx = canvas.getContext("2d");
let desenhando = false;

canvas.addEventListener("mousedown", () => desenhando = true);
canvas.addEventListener("mouseup", () => desenhando = false);
canvas.addEventListener("mousemove", desenhar);

function desenhar(e){
  if(!desenhando) return;
  ctx.lineWidth = 2;
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
}

function limpar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

async function enviar(){
  const nome = document.getElementById("nome").value;
  const cpf = document.getElementById("cpf").value;
  const telefone = document.getElementById("telefone").value;
  const plano = document.getElementById("plano").value;

  const assinatura = canvas.toDataURL();

  const dados = {nome, cpf, telefone, plano, assinatura};

  // 🔗 WEBHOOK
  await fetch("https://SEU-WEBHOOK-AQUI", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(dados)
  });

  // 📄 PDF
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Contrato SUA87FM", 10, 10);
  doc.text(`Nome: ${nome}`, 10, 20);
  doc.text(`CPF/CNPJ: ${cpf}`, 10, 30);
  doc.text(`Telefone: ${telefone}`, 10, 40);
  doc.text(`Plano: R$ ${plano}`, 10, 50);

  doc.addImage(assinatura, "PNG", 10, 60, 100, 40);

  doc.save("contrato.pdf");

  alert("Contrato enviado com sucesso!");
}
</script>

</body>
</html>
